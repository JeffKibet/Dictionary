<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary</title>
    <link href = "./style.css" rel = "stylesheet">
</head>
<body>
     <div class="page" id="page"></div>

     <div class="guide-strip" aria-hidden="true">
      <span id="guideLeft">wordly</span>
      <span class="guide-strip__mark">✦</span>
      <span id="guideRight">a living dictionary</span>
    </div>

    <header class="masthead">
      <h1 class="masthead__title">Wordly<span class="masthead__dot">.</span></h1>
      <button id="themeToggle" class="theme-toggle" type="button" aria-pressed="false">
        <span class="theme-toggle__track"><span class="theme-toggle__thumb"></span></span>
        <span class="theme-toggle__label" id="themeLabel">day</span>
      </button>
    </header>

    <form id="searchForm" class="search" autocomplete="off">
      <label for="wordInput" class="visually-hidden">Look up a word</label>
      <input
        id="wordInput"
        name="word"
        type="text"
        class="search__input"
        placeholder="Look up a word…"
        aria-describedby="searchHint"
        required
      />
      <button type="submit" class="search__button">
        <span>Define</span>
      </button>
    </form>

    <p id="searchHint" class="search__hint">Try “ephemeral,” “petrichor,” or a word from today's reading.</p>
 
    <div id="results" class="results" aria-live="polite">
      <div class="empty-state" id="emptyState">
        <div class="empty-state__mark">§</div>
        <p>Nothing looked up yet. Every entry you find lives here until you search again.</p>
      </div>
    </div>
 
    <section class="saved" id="savedSection" hidden>
      <h2 class="saved__heading"><span class="saved__rule"></span>Saved words</h2>
      <ul class="saved__list" id="savedList"></ul>
    </section>
 
    <footer class="colophon">
      <p>Definitions via the Free Dictionary API. Built for Wordly's single‑page lab.</p>
    </footer>
 
  </div>
 
  <audio id="audioPlayer" preload="none"></audio>
 
  <script src="code.js"></script>
</body>
</html>
 

    <script src="./code.js"></script>
</body>
</html>
