<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary</title>
    <link href="./style.css" rel="stylesheet">
</head>
<body id="body">
    <div class="container">
        <div class="top-bar">
            <h1 id="title">📖 Wordly</h1>
            <button id="darkModeBtn">🌙 Dark Mode</button>
 </div>
 <p class="subtitle">Type a word below and hit search!</p>

 <form id="searchForm">
      <input type="text" id="searchInput" placeholder="Enter a word..." required>
      <button type="submit" id="searchBtn">Search</button>
    </form>

    <div id="results">
      <p class="hint-text">No word searched yet. Try typing something like "happy" 🙂</p>
    </div>
 
    <div id="savedSection">
      <h3>⭐ Saved Words</h3>
      <ul id="savedList"></ul>
    </div>
 
    </div>
    <audio id="audioPlayer"></audio>

    <script src="./code.js"></script>
</body>
</html>
